name: Deploy App to File Storage Site

on:
  push:
    branches:
      - main
    paths:
      - 'apps/app/**'
      - '.github/workflows/deploy-app-file-storage.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    environment: mainnet

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate ws-resources.json exists
        run: |
          if [ ! -f "./apps/app/ws-resources.json" ]; then
            echo "## Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Missing required file: \`apps/app/ws-resources.json\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This file is generated after your first manual deployment with \`site-builder\`." >> $GITHUB_STEP_SUMMARY

            echo "ERROR: apps/app/ws-resources.json not found!"
            echo "This file is generated after your first manual deployment with site-builder."
            exit 1
          fi
          echo "ws-resources.json found!"

      - name: Build SDK
        run: pnpm build:sdk

      - name: Build app for Mainnet
        working-directory: ./apps/app
        run: |
          pnpm build
          if [ -f "ws-resources.json" ]; then
            cp ws-resources.json dist/
          fi
        env:
          VITE_MYSO_NETWORK: mainnet
          VITE_MEMORY_SERVER_URL: ${{ vars.VITE_MEMORY_SERVER_URL }}
          VITE_MEMORY_PACKAGE_ID: ${{ vars.VITE_MEMORY_PACKAGE_ID }}
          VITE_MEMORY_REGISTRY_ID: ${{ vars.VITE_MEMORY_REGISTRY_ID }}
          VITE_MYDATA_KEY_SERVERS: ${{ vars.VITE_MYDATA_KEY_SERVERS }}
          VITE_ENOKI_API_KEY: ${{ vars.VITE_ENOKI_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_DOCS_URL: ${{ vars.VITE_DOCS_URL }}
          VITE_DEMO_URLS: ${{ vars.VITE_DEMO_URLS }}

      - name: Deploy to File Storage Site (Mainnet)
        id: deploy-mainnet
        uses: MystenLabs/file-storage-sites-github-actions/deploy@v1
        with:
          MYSO_ADDRESS: ${{ vars.MYSO_ADDRESS }}
          MYSO_KEYSTORE: ${{ secrets.MYSO_KEYSTORE }}
          DIST: ./apps/app/dist
          MYSO_NETWORK: mainnet
          EPOCHS: ${{ vars.FILE_STORAGE_EPOCHS || '3' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILE_STORAGE_CONFIG: |
            contexts:
              mainnet:
                system_object: 0x2134d52768ea07e8c43570ef975eb3e4c27a39fa6396bef985b5abc58d03ddd2
                staking_object: 0x10b9d30c28448939ce6c4d6c6e0ffce4a7f8a4ada8248bdad09ef8b70e4a3904
                n_shards: 1000
                max_epochs_ahead: 53
                wallet_config:
                  active_env: mainnet
                rpc_urls:
                  - https://fullnode.mainnet.mysosocial.network:443
            default_context: mainnet
          SITES_CONFIG: |
            contexts:
              mainnet:
                portal: wal.app
                package: 0x26eb7ee8688da02c5f671679524e379f0b837a12f1d1d799f255b7eea260ad27
                staking_object: 0x10b9d30c28448939ce6c4d6c6e0ffce4a7f8a4ada8248bdad09ef8b70e4a3904
                general:
                  wallet_env: mainnet
                  file_storage_context: mainnet
                  file_storage_package: 0xfa65cb2d62f4d39e60346fb7d501c12538ca2bbc646eaa37ece2aec5f897814e
                  gas_budget: 500000000
            default_context: mainnet
