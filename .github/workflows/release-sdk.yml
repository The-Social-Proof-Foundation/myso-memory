name: Release SDK

on:
  push:
    branches:
      - main
      - staging
      - dev
    paths:
      - 'packages/sdk/**'
      - '.github/workflows/release-sdk.yml'
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @socialproof/memory typecheck

      - name: Build SDK
        run: pnpm build:sdk

      # ── main branch → changeset version + stable release (latest) ──
      - name: Apply changesets (update version & CHANGELOG)
        if: github.ref == 'refs/heads/main'
        id: changeset_version
        run: |
          # Consume pending changesets → bump version + update CHANGELOG.md
          pnpm changeset version 2>/dev/null || true
          # Check if changeset produced any changes
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changelog & version bump
        if: github.ref == 'refs/heads/main' && steps.changeset_version.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version packages & update changelog [skip ci]"
          git push

      - name: Publish stable release
        if: github.ref == 'refs/heads/main'
        id: publish_sdk
        run: |
          VERSION=$(node -p "require('./packages/sdk/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          npm view @socialproof/memory@$VERSION version 2>/dev/null \
            && echo "Version $VERSION already published, skipping" && echo "published=false" >> $GITHUB_OUTPUT && exit 0
          cd packages/sdk && npm publish --provenance --access public
          echo "published=true" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && steps.publish_sdk.outputs.published == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const version = '${{ steps.publish_sdk.outputs.version }}';
            const tag = `@socialproof/memory@${version}`;
            // Extract latest changelog entry
            let body = `Release @socialproof/memory v${version}`;
            try {
              const changelog = fs.readFileSync('packages/sdk/CHANGELOG.md', 'utf8');
              const match = changelog.match(/## \d+\.\d+\.\d+[\s\S]*?(?=## \d+\.\d+\.\d+|$)/);
              if (match) body = match[0].trim();
            } catch (e) { /* use default body */ }
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body,
              draft: false,
              prerelease: false,
            });

      # ── staging branch → release candidate (rc tag, auto-increment) ──
      - name: Publish staging release candidate
        if: github.ref == 'refs/heads/staging'
        run: |
          BASE_VERSION=$(node -p "require('./packages/sdk/package.json').version")
          LATEST=$(npm view @socialproof/memory versions --json 2>/dev/null \
            | node -p "
                const versions = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                const nums = (Array.isArray(versions) ? versions : [versions])
                  .filter(v => v.startsWith('${BASE_VERSION}-rc.'))
                  .map(v => +v.split('-rc.')[1])
                  .sort((a,b) => b - a);
                nums.length ? nums[0] : -1;
              " || echo "-1")
          NEXT=$((LATEST + 1))
          NEW_VERSION="${BASE_VERSION}-rc.${NEXT}"
          echo "Publishing @socialproof/memory@${NEW_VERSION}"
          cd packages/sdk
          node -e "const p=require('./package.json');p.version='${NEW_VERSION}';require('fs').writeFileSync('./package.json',JSON.stringify(p,null,4)+'\n')"
          npm publish --tag rc --provenance --access public

      # ── dev branch → prerelease (dev tag, auto-increment) ──
      - name: Publish dev prerelease
        if: github.ref == 'refs/heads/dev'
        run: |
          BASE_VERSION=$(node -p "require('./packages/sdk/package.json').version")
          LATEST=$(npm view @socialproof/memory versions --json 2>/dev/null \
            | node -p "
                const versions = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                const nums = (Array.isArray(versions) ? versions : [versions])
                  .filter(v => v.startsWith('${BASE_VERSION}-dev.'))
                  .map(v => +v.split('-dev.')[1])
                  .sort((a,b) => b - a);
                nums.length ? nums[0] : -1;
              " || echo "-1")
          NEXT=$((LATEST + 1))
          NEW_VERSION="${BASE_VERSION}-dev.${NEXT}"
          echo "Publishing @socialproof/memory@${NEW_VERSION}"
          cd packages/sdk
          node -e "const p=require('./package.json');p.version='${NEW_VERSION}';require('fs').writeFileSync('./package.json',JSON.stringify(p,null,4)+'\n')"
          npm publish --tag dev --provenance --access public
