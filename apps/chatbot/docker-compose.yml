name: memory-chatbot

services:
  postgres:
    image: postgres:17
    container_name: chatbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot_secret
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - chatbot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  chatbot_pgdata:
